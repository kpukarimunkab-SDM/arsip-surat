<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard Login</title>
    <!-- Optimasi 1: DNS Prefetch untuk mempercepat resolusi domain Google -->
    <link rel="dns-prefetch" href="https://script.google.com">
    <link rel="dns-prefetch" href="https://script.googleusercontent.com">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Times New Roman', serif;
            overflow: hidden;
        }

        .main-container {
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .header-text {
            text-align: center;
            color: #f1d28c;
            margin-bottom: 50px;
            z-index: 2;
            padding: 0 20px;
        }

        .header-text h1 {
            font-size: clamp(24pt, 5vw, 32pt); 
            letter-spacing: 4px;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .header-text p {
            font-size: clamp(12pt, 3vw, 18pt);
            letter-spacing: 2px;
            margin: 5px 0 0 0;
            text-transform: uppercase;
        }

        .login-btn-circle {
            width: clamp(180px, 40vw, 220px); 
            height: clamp(180px, 40vw, 220px);
            border-radius: 50%;
            background: radial-gradient(circle, #8b0000 0%, #4a0000 100%);
            border: 10px solid #d4af37;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.6), inset 0 0 20px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2;
            color: white;
        }

        .login-btn-circle:hover {
            transform: scale(1.05);
            box-shadow: 0 0 70px rgba(212, 175, 55, 0.8);
        }

        .login-btn-circle span {
            font-size: clamp(18pt, 4vw, 24pt);
            font-weight: bold;
            letter-spacing: 2px;
        }

        .login-btn-circle .key-icon {
            font-size: clamp(24pt, 5vw, 30pt);
            margin-top: 10px;
            color: #d4af37;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 10;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            overflow-y: auto; 
        }

        .token-modal-content {
            background: linear-gradient(145deg, #4a0000, #2a0000);
            margin: 15vh auto;
            border: 2px solid #d4af37;
            width: 90%; 
            max-width: 400px; 
            border-radius: 15px;
            color: #f1d28c;
            box-shadow: 0 0 40px rgba(0,0,0,1);
            position: relative;
            text-align: center;
            overflow: hidden;
        }

        .modal-header {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }

        .close-btn {
            position: absolute;
            right: 15px; top: 10px;
            color: #d4af37;
            font-size: 24px;
            cursor: pointer;
            z-index: 11;
        }

        .input-group {
            padding: 20px;
        }

        .password-container {
            position: relative;
            width: 90%;
            margin: 0 auto 20px auto;
        }

        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 15px 45px 15px 15px; 
            background: #fff;
            border: 1px solid #d4af37;
            border-radius: 5px;
            font-size: 14pt;
            text-align: center;
            box-sizing: border-box; 
            color: #333;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #4a0000;
            font-size: 1.2rem;
            user-select: none;
        }

        .validate-btn {
            background: #4a0000;
            color: white;
            border: 1px solid #d4af37;
            padding: 12px;
            font-size: 14pt;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            width: 90%;
            transition: background 0.3s;
        }

        .validate-btn:hover {
            background: #6a0000;
        }

        .spreadsheet-modal-content {
            background: white;
            margin: 2vh auto;
            width: 95%;
            height: 96vh;
            border-radius: 10px;
            border: 3px solid #d4af37;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .ss-header {
            background: #f1d28c;
            color: #4a0000;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 5;
        }

        .ss-body {
            flex: 1;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        /* Optimasi 2: Loader Visual */
        .loader-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 4;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4a0000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-text">
        <h1>ARSIP DIGITAL</h1>
        <p>Sosdiklih, Parmas, dan SDM</p>
    </div>

    <div class="login-btn-circle" onclick="showTokenModal()">
        <span>LOG IN</span>
        <div class="key-icon">🔑</div>
    </div>
</div>

<!-- Modal 1: Token Input -->
<div id="tokenModal" class="modal">
    <div class="token-modal-content">
        <span class="close-btn" onclick="closeModal('tokenModal')">&times;</span>
        <div class="modal-header">
            <h3>TOKEN AUTHENTICATION</h3>
        </div>
        <div class="input-group">
            <p>Enter Admin Token (Password)</p>
            <div class="password-container">
                <input type="password" id="tokenInput" placeholder="Token">
                <span class="toggle-password" onclick="toggleVisibility()">👁️</span>
            </div>
            <button class="validate-btn" onclick="checkToken()">VALIDATE TOKEN</button>
            <p id="error-msg" style="color: #ff6b6b; margin-top: 10px; font-size: 10pt; visibility: hidden;">Token Salah! Silakan coba lagi.</p>
        </div>
    </div>
</div>

<!-- Modal 2: Spreadsheet Iframe -->
<div id="ssModal" class="modal">
    <div class="spreadsheet-modal-content">
        <div class="ss-header">
            <span>Arsip Digital | Sosdiklih, Parmas, dan SDM</span>
            <span style="cursor:pointer; font-size: 24px;" onclick="closeModal('ssModal')">&times;</span>
        </div>
        <div class="ss-body">
            <!-- Loader Overlay -->
            <div id="loaderOverlay" class="loader-overlay">
                <div class="spinner"></div>
                <p style="color:#4a0000; margin-top:10px;">Sedang Sinkronisasi Data...</p>
            </div>
            <!-- Iframe dengan onload event -->
            <iframe id="gasFrame" src="" onload="hideLoader()"></iframe>
        </div>
    </div>
</div>

    // Optimasi 3: Silent Preload saat halaman utama terbuka
    window.addEventListener('load', () => {
        const frame = document.getElementById('gasFrame');
        // Mulai memuat URL di background agar tersimpan di cache browser
        frame.src = TARGET_URL; 
    });

    function showTokenModal() {
        document.getElementById('tokenModal').style.display = 'block';
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
        if(id === 'tokenModal') {
            const input = document.getElementById('tokenInput');
            input.value = '';
            input.type = 'password'; 
            document.getElementById('error-msg').style.visibility = 'hidden';
            document.querySelector('.toggle-password').innerText = '👁️';
        }
    }

    function toggleVisibility() {
        const input = document.getElementById('tokenInput');
        const icon = document.querySelector('.toggle-password');
        if (input.type === "password") {
            input.type = "text";
            icon.innerText = "🙈"; 
        } else {
            input.type = "password";
            icon.innerText = "👁️"; 
        }
    }

    function checkToken() {
        const input = document.getElementById('tokenInput').value;
        const errorMsg = document.getElementById('error-msg');
        
        if(input === CORRECT_TOKEN) {
            closeModal('tokenModal');
            document.getElementById('ssModal').style.display = 'block';
            // URL sudah di-assign saat window.load, jadi tinggal tampilkan modal
        } else {
            errorMsg.style.visibility = 'visible';
            document.getElementById('tokenInput').style.borderColor = '#ff6b6b';
        }
    }

    // Fungsi baru untuk menyembunyikan loader setelah iframe selesai dimuat
    function hideLoader() {
        const loader = document.getElementById('loaderOverlay');
        if(loader) loader.style.display = 'none';
    }

    window.onclick = function(event) {
        if (event.target.className === 'modal') {
            if(event.target.id !== 'ssModal') { 
                closeModal(event.target.id);
            }
        }
    }

    document.getElementById("tokenInput").addEventListener("keyup", function(event) {
        if (event.key === "Enter") {
            checkToken();
        }
    });
</script>

</body>
</html>
